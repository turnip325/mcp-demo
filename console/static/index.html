<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FortiWeb WAF Demo — MCP Console</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --green:     #3fb950;
      --green-bg:  #0d2818;
      --red:       #f85149;
      --red-bg:    #2d1117;
      --blue:      #58a6ff;
      --yellow:    #d29922;
      --btn-leg:   #1f6feb;
      --btn-atk:   #6e2d2d;
      --btn-atk-h: #922727;
      --radius:    6px;
      --mono:      'Consolas', 'Menlo', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    header .fortinet-badge {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    #session-status {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
    }
    #session-status.ready { border-color: var(--green); color: var(--green); }
    #session-status.error { border-color: var(--red); color: var(--red); }

    #btn-new-session {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
    }
    #btn-new-session:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }

    /* ── Panel headers ── */
    .panel-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .panel-header.legitimate {
      color: var(--green);
      background: var(--green-bg);
      border-right: 1px solid var(--border);
    }
    .panel-header.attacks {
      color: var(--red);
      background: var(--red-bg);
    }

    /* ── Scenario lists ── */
    .scenario-list {
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .scenario {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scenario:hover { border-color: var(--blue); }
    .scenario.running { border-color: var(--yellow); opacity: .8; }

    .scenario .tool-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--blue);
      font-weight: 600;
    }
    .scenario .label {
      font-size: 12px;
      color: var(--muted);
    }
    .scenario .payload-preview {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scenario.legitimate { border-left: 3px solid var(--green); }
    .scenario.attack     { border-left: 3px solid var(--red); }

    /* ── Result panel ── */
    #result-panel {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: 340px;
    }

    #result-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    #result-header .label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    #verdict {
      font-size: 13px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      display: none;
    }
    #verdict.passed { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); display: inline-block; }
    #verdict.blocked { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); display: inline-block; }

    #http-code {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }
    #result-tool {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--blue);
      flex: 1;
    }
    #result-time {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    #result-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--bg);
    }
    #result-body.has-content { color: var(--text); }
    #result-body.blocked-content { color: var(--red); }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>FortiWeb WAF Demo &mdash; MCP Attack Console</h1>
  <span class="fortinet-badge">Fortinet</span>
  <span id="session-status">Connecting&hellip;</span>
  <button id="btn-new-session" onclick="newSession()">New Session</button>
</header>

<main>
  <!-- Legitimate calls header -->
  <div class="panel-header legitimate">&#10003; Legitimate Tool Calls</div>
  <!-- Attack payloads header -->
  <div class="panel-header attacks">&#9888; Attack Payloads</div>

  <!-- Legitimate scenarios -->
  <div class="scenario-list" id="list-legitimate"></div>

  <!-- Attack scenarios -->
  <div class="scenario-list" id="list-attacks" style="border-right:none;"></div>

  <!-- Result panel -->
  <div id="result-panel">
    <div id="result-header">
      <span class="label">Result</span>
      <span id="result-tool">&mdash;</span>
      <span id="verdict"></span>
      <span id="http-code"></span>
      <span id="result-time"></span>
    </div>
    <div id="result-body">Click a scenario above to send an MCP tool call through FortiWeb.</div>
  </div>
</main>

<script>
// ── Scenario definitions ────────────────────────────────────────────────────

const SCENARIOS = {
  legitimate: [
    {
      label: "Get current time",
      tool: "get_current_time",
      arguments: {},
    },
    {
      label: "Read file — status.txt",
      tool: "read_file",
      arguments: { path: "status.txt" },
    },
    {
      label: "Read file — config.yaml",
      tool: "read_file",
      arguments: { path: "config.yaml" },
    },
    {
      label: "Query database — users",
      tool: "query_database",
      arguments: { table: "users" },
    },
    {
      label: "Query database — products (price > 1000)",
      tool: "query_database",
      arguments: { table: "products", where_clause: "price > 1000" },
    },
    {
      label: "Fetch URL — httpbin.org",
      tool: "fetch_url",
      arguments: { url: "https://httpbin.org/get" },
    },
    {
      label: "Ping host — 8.8.8.8",
      tool: "ping_host",
      arguments: { host: "8.8.8.8" },
    },
  ],

  attacks: [
    {
      label: "Path Traversal — /etc/passwd",
      tool: "read_file",
      arguments: { path: "../../etc/passwd" },
    },
    {
      label: "Path Traversal — /etc/shadow",
      tool: "read_file",
      arguments: { path: "../../../etc/shadow" },
    },
    {
      label: "SQL Injection — OR 1=1 tautology",
      tool: "query_database",
      arguments: { table: "users", where_clause: "1=1 OR '1'='1'" },
    },
    {
      label: "Command Injection — semicolon separator",
      tool: "ping_host",
      arguments: { host: "google.com; cat /etc/passwd" },
    },
    {
      label: "Command Injection — backtick subshell",
      tool: "ping_host",
      arguments: { host: "google.com `id`" },
    },
  ],
};

// ── Render scenario cards ────────────────────────────────────────────────────

function renderScenarios() {
  for (const [type, list] of Object.entries(SCENARIOS)) {
    const container = document.getElementById(`list-${type}`);
    list.forEach((s, i) => {
      const card = document.createElement("div");
      card.className = `scenario ${type}`;
      card.id = `scenario-${type}-${i}`;
      card.onclick = () => runScenario(s, card);

      const preview = JSON.stringify(s.arguments);

      card.innerHTML = `
        <div class="tool-name">${s.tool}</div>
        <div class="label">${s.label}</div>
        <div class="payload-preview">${preview}</div>
      `;
      container.appendChild(card);
    });
  }
}

// ── Result panel ─────────────────────────────────────────────────────────────

function showResult(scenario, result) {
  const toolEl   = document.getElementById("result-tool");
  const verdictEl = document.getElementById("verdict");
  const httpEl   = document.getElementById("http-code");
  const bodyEl   = document.getElementById("result-body");
  const timeEl   = document.getElementById("result-time");

  toolEl.textContent = `${scenario.tool}(${JSON.stringify(scenario.arguments)})`;
  httpEl.textContent = result.http_code ? `HTTP ${result.http_code}` : "";
  timeEl.textContent = new Date().toLocaleTimeString();

  verdictEl.className = "";
  if (result.blocked) {
    verdictEl.textContent = "BLOCKED";
    verdictEl.className = "blocked";
    bodyEl.className = "blocked-content";
  } else {
    verdictEl.textContent = "PASSED";
    verdictEl.className = "passed";
    bodyEl.className = "has-content";
  }

  // Extract the human-readable text from the MCP JSON-RPC/SSE response.
  // Response format: "event: message\r\ndata: {jsonrpc envelope}\r\n\r\n"
  let display = result.body || "(empty response)";
  try {
    const match = display.match(/^data:\s*(.+)$/m);
    if (match) {
      const parsed = JSON.parse(match[1]);
      if (parsed.result && Array.isArray(parsed.result.content)) {
        display = parsed.result.content
          .filter(c => c.type === "text")
          .map(c => c.text)
          .join("\n");
      } else if (parsed.error) {
        display = `Error ${parsed.error.code}: ${parsed.error.message}`;
      } else {
        display = JSON.stringify(parsed, null, 2);
      }
    }
  } catch (_) { /* keep raw on any parse failure */ }

  bodyEl.textContent = display;
}

function showError(message) {
  const bodyEl = document.getElementById("result-body");
  bodyEl.className = "blocked-content";
  bodyEl.textContent = `Error: ${message}`;
  document.getElementById("verdict").className = "";
  document.getElementById("http-code").textContent = "";
}

// ── API calls ────────────────────────────────────────────────────────────────

async function runScenario(scenario, card) {
  // Visual feedback while running
  card.classList.add("running");
  const bodyEl = document.getElementById("result-body");
  bodyEl.className = "";
  bodyEl.innerHTML = '<span class="spinner"></span>  Sending\u2026';
  document.getElementById("result-tool").textContent = scenario.tool;
  document.getElementById("verdict").className = "";
  document.getElementById("http-code").textContent = "";

  try {
    const resp = await fetch("/api/call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tool: scenario.tool, arguments: scenario.arguments }),
    });
    const result = await resp.json();
    showResult(scenario, result);
  } catch (err) {
    showError(err.message);
  } finally {
    card.classList.remove("running");
  }
}

async function newSession() {
  const statusEl = document.getElementById("session-status");
  statusEl.className = "";
  statusEl.textContent = "Connecting\u2026";
  try {
    const resp = await fetch("/api/session", { method: "POST" });
    const data = await resp.json();
    if (data.session_id) {
      statusEl.className = "ready";
      statusEl.textContent = `Session: ${data.session_id.slice(0, 12)}\u2026`;
    } else {
      throw new Error(data.error || "Unknown error");
    }
  } catch (err) {
    statusEl.className = "error";
    statusEl.textContent = `Error: ${err.message}`;
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────

renderScenarios();
newSession();  // establish session on page load
</script>

</body>
</html>
